<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ВАЙБ-ЛОЖЕ</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Cormorant+SC:wght@600&family=Unbounded:wght@900&display=swap"
    rel="stylesheet">

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #0d0015;
    }

    #c {
      position: fixed;
      top: 0;
      left: 0;
      display: block;
    }

    /* ── Title ─────────────────────────────────────────────── */
    .title {
      display: inline-block;
      position: fixed;
      top: 36px;
      left: 50%;

      font-family: 'Press Start 2P', cursive;
      font-weight: 400;
      font-size: clamp(38px, 7vw, 108px);
      color: #ff71ce;
      letter-spacing: 0.22em;
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;
      opacity: 0;

      animation:
        unfurl 2.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards,
        glitch 6s linear 3s infinite,
        sway 16s ease-in-out 2.5s infinite;

      text-shadow:
        0 0 40px rgba(255, 113, 206, 0.55),
        0 0 80px rgba(255, 113, 206, 0.2);
    }

    .title::before,
    .title::after {
      content: 'ВАЙБ-ЛОЖЕ';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
    }

    .title::before {
      color: #01cdfe;
      animation: glitch-r 6s linear 3s infinite;
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
    }

    .title::after {
      color: #b967ff;
      animation: glitch-l 6s linear 3s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
    }

    @keyframes sway {
      0% {
        transform: translateX(-50%) rotate(0deg);
      }

      25% {
        transform: translateX(-50%) rotate(1.5deg);
      }

      75% {
        transform: translateX(-50%) rotate(-1.5deg);
      }

      100% {
        transform: translateX(-50%) rotate(0deg);
      }
    }

    @keyframes unfurl {
      from {
        opacity: 0;
        letter-spacing: 0.75em;
        filter: blur(16px);
        transform: translateX(-50%) translateY(-8px);
      }

      to {
        opacity: 1;
        letter-spacing: 0.22em;
        filter: blur(0);
        transform: translateX(-50%) translateY(0);
      }
    }

    @keyframes glitch {

      0%,
      89%,
      91%,
      93%,
      95%,
      100% {
        transform: translateX(-50%) skewX(0deg);
        filter: none;
      }

      90% {
        transform: translateX(calc(-50% + 3px)) skewX(-1deg);
        filter: hue-rotate(60deg);
      }

      92% {
        transform: translateX(calc(-50% - 3px)) skewX(1deg);
        filter: hue-rotate(-40deg);
      }

      94% {
        transform: translateX(-50%) skewX(0deg);
      }
    }

    @keyframes glitch-r {

      0%,
      89%,
      95%,
      100% {
        opacity: 0;
        transform: translateX(0);
      }

      90% {
        opacity: 0.7;
        transform: translateX(4px);
      }

      91% {
        opacity: 0;
      }

      92% {
        opacity: 0.5;
        transform: translateX(-3px);
      }

      93% {
        opacity: 0;
      }
    }

    @keyframes glitch-l {

      0%,
      89%,
      95%,
      100% {
        opacity: 0;
        transform: translateX(0);
      }

      90% {
        opacity: 0;
      }

      91% {
        opacity: 0.6;
        transform: translateX(-4px);
      }

      92% {
        opacity: 0;
      }

      93% {
        opacity: 0.4;
        transform: translateX(2px);
      }

      94% {
        opacity: 0;
      }
    }

    /* ── Scanlines overlay ─────────────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(to bottom,
          transparent 0px,
          transparent 2px,
          rgba(0, 0, 0, 0.13) 2px,
          rgba(0, 0, 0, 0.13) 4px);
      pointer-events: none;
      z-index: 5;
    }

    /* ── Credit ─────────────────────────────────────────────── */
    .credit {
      position: fixed;
      bottom: 14px;
      left: 16px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 30px;
      letter-spacing: 0.15em;
      color: rgba(255, 113, 206, 0.25);
      pointer-events: none;
      z-index: 10;
      user-select: none;
    }

    /* ── Transition veil ────────────────────────────────────── */
    #veil {
      position: fixed;
      inset: 0;
      background: #ff71ce;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #veil.show {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Volume Control ─────────────────────────────────────── */
    #vol-ctrl {
      position: fixed;
      bottom: 22px;
      right: 22px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0.22;
      transition: opacity 0.35s ease;
    }

    #vol-ctrl:hover {
      opacity: 0.82;
    }

    #vol-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 4px rgba(255, 113, 206, 0.7));
    }

    #vol-slider {
      -webkit-appearance: none;
      appearance: none;
      writing-mode: vertical-lr;
      direction: rtl;
      width: 2px;
      height: 68px;
      background: linear-gradient(to top, #ff71ce var(--pct, 10%), rgba(255, 113, 206, 0.18) var(--pct, 10%));
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 2px;
    }

    #vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff71ce;
      box-shadow: 0 0 6px rgba(255, 113, 206, 0.9), 0 0 14px rgba(255, 113, 206, 0.4);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    #vol-slider::-webkit-slider-thumb:hover {
      transform: scale(1.4);
      box-shadow: 0 0 10px rgba(255, 113, 206, 1), 0 0 22px rgba(255, 113, 206, 0.6);
    }

    #vol-slider::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff71ce;
      border: none;
      box-shadow: 0 0 6px rgba(255, 113, 206, 0.9);
      cursor: pointer;
    }
  </style>
</head>

<body>
  <audio id="bg-music" src="music/vibes.mp3" loop></audio>
  <canvas id="c"></canvas>
  <div class="title">ВАЙБ-ЛОЖЕ</div>
  <div class="credit">Bobo studio 2026</div>
  <div id="veil"></div>

  <!-- Volume control -->
  <div id="vol-ctrl">
    <input id="vol-slider" type="range" min="0" max="100" value="10" step="1">
    <svg id="vol-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path id="vol-path" d="M11 5L6 9H2v6h4l5 4V5z" fill="rgba(255,113,206,0.9)" />
      <path id="vol-wave1" d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="rgba(255,113,206,0.9)" stroke-width="1.5"
        stroke-linecap="round" />
      <path id="vol-wave2" d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="rgba(255,113,206,0.6)" stroke-width="1.5"
        stroke-linecap="round" />
    </svg>
  </div>

  <script>
    'use strict';

    document.addEventListener('click', () => {
      const audio = document.getElementById('bg-music');
      audio.volume = 0.1; // initial 10%
      audio.play();
    }, { once: true });

    const { Engine, Body, Bodies, World, Events, Mouse, MouseConstraint, Runner, Vector } = Matter;

    // ── Canvas ──────────────────────────────────────────────────────────────────

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W = 0, H = 0;

    function setSize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    setSize();
    window.addEventListener('resize', () => {
      setSize();
      rebuildStatics();
      // Пересоздаём карточки с новым масштабом только если не заблокированы
      if (!locked) spawnCards();
    });

    // ── Floating code fragments ──────────────────────────────────────────────────

    const CODE_LINES = [
      'const vibe = () => ∞',
      'while(dream) { feel(); }',
      'import { soul } from "void"',
      '.snap { cursor: grab; }',
      'body { overflow: hidden; }',
      'return new Promise(ok)',
      'Matter.Bodies.portal()',
      'filter: blur(∞px)',
      'z-index: ложе;',
      'animation: unfurl 2.2s',
      'export default ВАЙБ',
      'const rgb = [255,113,206]',
      'world.gravity.y = 2',
      '@keyframes glitch { }',
      '{ color: #ff71ce }',
      'opacity: 0 → 1',
      'body.applyForce(∞)',
      'canvas.getContext("2d")',
      'let slotGlow = 0',
      'requestAnimationFrame(∞)',
    ];

    // Фрагменты движутся сверху вниз и зацикливаются:
    const codeFragments = Array.from({ length: 26 }, (_, i) => ({
      text: CODE_LINES[i % CODE_LINES.length],
      x: Math.random() * 1.2 - 0.1,
      y: Math.random(),                        // начальная Y 0..1
      vy: 0.00006 + Math.random() * 0.00008,   // скорость вниз (положительная = увеличиваем y)
      alpha: 0.04 + Math.random() * 0.08,
      size: 9 + Math.random() * 5,
      color: Math.random() > 0.5 ? '#ff71ce' : '#01cdfe',
    }));

    // ── Film grain ───────────────────────────────────────────────────────────────

    const NOISE_SZ = 256;
    const noiseCv = document.createElement('canvas');
    noiseCv.width = noiseCv.height = NOISE_SZ;

    (() => {
      const nc = noiseCv.getContext('2d');
      const img = nc.createImageData(NOISE_SZ, NOISE_SZ);
      for (let i = 0; i < img.data.length; i += 4) {
        const v = (Math.random() * 255) | 0;
        img.data[i] = img.data[i + 1] = img.data[i + 2] = v;
        img.data[i + 3] = 11;
      }
      nc.putImageData(img, 0, 0);
    })();

    let noisePat = null;

    // ── Physics ──────────────────────────────────────────────────────────────────

    const engine = Engine.create({ gravity: { x: 0, y: 2 } });
    const world = engine.world;
    Runner.run(Runner.create(), engine);

    // ── Card config ───────────────────────────────────────────────────────────────

    const CARD_W_BASE = 128, CARD_H_BASE = 128, CARD_R_BASE = 20;

    // Масштаб карточек в зависимости от размера экрана
    function cardScale() {
      const minDim = Math.min(W, H);
      // На десктопе (>=900px) — полный размер; на телефонах уменьшаем
      return Math.min(1, minDim / 520);
    }
    const CARD_W = () => Math.round(CARD_W_BASE * cardScale());
    const CARD_H = () => Math.round(CARD_H_BASE * cardScale());
    const CARD_R = () => Math.round(CARD_R_BASE * cardScale());

    // ══════════════════════════════════════════════════════════════════════════════
    // ── ICON SYSTEM ───────────────────────────────────────────────────────────────
    // Чтобы добавить новую иконку:
    //   1. Напишите функцию drawMyIcon(ctx, size) — рисует иконку в квадрат [0,0,size,size]
    //   2. Добавьте запись в ICON_REGISTRY: { id: 'myicon', draw: drawMyIcon }
    //   3. В CARDS_DEF укажите icon: 'myicon'
    // ══════════════════════════════════════════════════════════════════════════════

    // Вспомогательная функция скругления (используется во всех иконках)
    function roundRectPath(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    // ── Icon: Xiangqi ─────────────────────────────────────────────────────────────
    function drawXiangqiIcon(ctx, S) {
      const pad = S * 0.10;
      const bw = S - pad * 2;

      ctx.fillStyle = '#f0b060';
      ctx.beginPath();
      ctx.roundRect(pad, pad, bw, bw, S * 0.10);
      ctx.fill();

      ctx.strokeStyle = '#8b4513';
      ctx.lineWidth = S * 0.07;
      ctx.beginPath();
      ctx.roundRect(pad, pad, bw, bw, S * 0.10);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(0,0,0,0.28)';
      ctx.lineWidth = 1.2;
      const gpad = pad + S * 0.10;
      const gw = S - gpad * 2;
      const cols = 4, rows = 4;
      for (let c = 0; c <= cols; c++) {
        const x = gpad + (gw / cols) * c;
        ctx.beginPath(); ctx.moveTo(x, gpad); ctx.lineTo(x, S - gpad); ctx.stroke();
      }
      for (let r = 0; r <= rows; r++) {
        const y = gpad + (gw / rows) * r;
        ctx.beginPath(); ctx.moveTo(gpad, y); ctx.lineTo(S - gpad, y); ctx.stroke();
      }

      const riverY = S * 0.44;
      const riverH = S * 0.12;
      ctx.save();
      ctx.beginPath(); ctx.roundRect(pad + 1, pad + 1, bw - 2, bw - 2, S * 0.08); ctx.clip();
      ctx.fillStyle = 'rgba(64, 224, 208, 0.65)';
      ctx.fillRect(pad, riverY, bw, riverH);
      ctx.restore();

      ctx.strokeStyle = 'rgba(0,0,0,0.18)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(pad + S * 0.04, pad + S * 0.04, bw - S * 0.08, bw - S * 0.08, S * 0.07);
      ctx.stroke();

      const pieces = [
        { cx: S * 0.42, cy: S * 0.28, red: true },
        { cx: S * 0.72, cy: S * 0.28, red: true },
        { cx: S * 0.30, cy: S * 0.72, red: false },
        { cx: S * 0.62, cy: S * 0.72, red: false },
      ];
      const pr = S * 0.092;
      pieces.forEach(({ cx, cy, red }) => {
        ctx.beginPath(); ctx.arc(cx, cy + 1.5, pr, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fill();
        ctx.beginPath(); ctx.arc(cx, cy, pr, 0, Math.PI * 2);
        ctx.fillStyle = red ? '#c22525' : '#2a2a2a'; ctx.fill();
        ctx.strokeStyle = red ? '#5c0000' : '#000';
        ctx.lineWidth = 1.4; ctx.stroke();
        ctx.beginPath(); ctx.arc(cx - pr * 0.25, cy - pr * 0.3, pr * 0.38, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.fill();
      });
    }
    // ── Icon: Synth ──────────────────────────────────────────────────────────
    function drawSynthIcon(ctx, S) {

      const R = S * 0.1;           // corner radius (≈ iOS squircle feel)

      // ── 1. Clip to rounded square ────────────────────────────────────────────
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(0, 0, S, S, R);
      ctx.clip();

      // ── 2. Background ────────────────────────────────────────────────────────
      ctx.fillStyle = '#06061a';
      ctx.fillRect(0, 0, S, S);

      // Ambient glow blobs (mirrors the live site atmosphere)
      const blobs = [
        { x: S * 0.22, y: S * 0.28, r: S * 0.65, c: 'rgba(0,22,75,0.72)' },
        { x: S * 0.80, y: S * 0.75, r: S * 0.58, c: 'rgba(80,0,58,0.55)' },
      ];
      blobs.forEach(b => {
        const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
        g.addColorStop(0, b.c); g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g; ctx.fillRect(0, 0, S, S);
      });

      // ── 3. Waveform layers ───────────────────────────────────────────────────
      const MY = S * 0.50;         // vertical centre
      const X0 = S * 0.00;         // left edge of wave span
      const WW = S * 1;         // wave span width
      const HALF = S * 0.185;        // peak half-amplitude

      const LAYERS = [
        { col: '#00f5d4', cyc: 2.3, amp: 1.00, phi: 0.00, lw: S * 0.0308, gBlur: S * 0.124, gAlpha: 0.28 },
        { col: '#f72585', cyc: 3.4, amp: 0.58, phi: Math.PI * 0.55, lw: S * 0.0335, gBlur: S * 0.018, gAlpha: 0.20 },
        { col: '#7b2fff', cyc: 1.75, amp: 0.40, phi: Math.PI * 1.20, lw: S * 0.0326, gBlur: S * 0.014, gAlpha: 0.15 },
      ];

      function wavePath(L) {
        ctx.beginPath();
        for (let i = 0; i <= 600; i++) {
          const t = i / 600;
          const px = X0 + t * WW;
          const env = Math.sin(t * Math.PI);          // soft taper at both ends
          const py = MY + Math.sin(t * Math.PI * 2 * L.cyc + L.phi) * L.amp * HALF * env;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
      }

      LAYERS.forEach(L => {
        // Glow pass
        ctx.save();
        ctx.filter = `blur(${L.gBlur}px)`;
        ctx.globalAlpha = L.gAlpha;
        wavePath(L);
        ctx.strokeStyle = L.col;
        ctx.lineWidth = L.lw * 5;
        ctx.lineJoin = 'round';
        ctx.stroke();
        ctx.restore();

        // Crisp pass
        ctx.save();
        ctx.globalAlpha = 0.88;
        wavePath(L);
        ctx.strokeStyle = L.col;
        ctx.lineWidth = L.lw;
        ctx.lineJoin = 'round';
        ctx.stroke();
        ctx.restore();
      });

      // ── 4. Centre baseline ───────────────────────────────────────────────────
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(X0, MY); ctx.lineTo(X0 + WW, MY);
      ctx.strokeStyle = 'rgba(255,255,255,0.035)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();

      // ── 5. Frequency indicator dots (mirrors live visualiser) ────────────────
      const DOTS = [
        { t: 0.28, col: '#00f5d4', r: S * 0.0075 },
        { t: 0.52, col: '#f72585', r: S * 0.0058 },
        { t: 0.69, col: '#7b2fff', r: S * 0.0046 },
      ];
      DOTS.forEach(d => {
        const dx = X0 + d.t * WW;
        // halo
        ctx.save();
        ctx.filter = `blur(${S * 0.012}px)`;
        ctx.beginPath(); ctx.arc(dx, MY, d.r * 2.8, 0, Math.PI * 2);
        ctx.fillStyle = d.col; ctx.globalAlpha = 0.38; ctx.fill();
        ctx.restore();
        // dot
        ctx.beginPath(); ctx.arc(dx, MY, d.r, 0, Math.PI * 2);
        ctx.fillStyle = d.col; ctx.globalAlpha = 0.9; ctx.fill();
        ctx.globalAlpha = 1;
      });

      // ── 6. Horizontal edge vignette ──────────────────────────────────────────
      // Overlay bg colour at edges so waveform fades out (opaque-bg-safe version
      // of the destination-out approach used on the live site canvas)
      const FW = WW * 0.10;

      const gL = ctx.createLinearGradient(X0, 0, X0 + FW, 0);
      gL.addColorStop(0, '#06060f'); gL.addColorStop(1, 'rgba(6,6,15,0)');
      ctx.fillStyle = gL; ctx.fillRect(0, 0, X0 + FW, S);

      const gR = ctx.createLinearGradient(X0 + WW - FW, 0, X0 + WW, 0);
      gR.addColorStop(0, 'rgba(6,6,15,0)'); gR.addColorStop(1, '#06060f');
      ctx.fillStyle = gR; ctx.fillRect(X0 + WW - FW, 0, S - (X0 + WW - FW), S);

      // ── 7. Inner border ───────────────────────────────────────────────────────
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(0, 0, S, S, R);
      ctx.strokeStyle = 'rgba(255,255,255,0.055)';
      ctx.lineWidth = S * 0.005;
      ctx.stroke();
      ctx.restore();

      ctx.restore(); // end rounded-rect clip
    }
    // ── Icon: Jawbreaker ──────────────────────────────────────────────────────────
    function drawJawbreakerIcon(ctx, S) {
      // Фон
      ctx.fillStyle = '#080814';
      roundRectPath(ctx, 0, 0, S, S, S * 0.1);
      ctx.fill();

      // Неоновая рамка
      const borderGrad = ctx.createLinearGradient(0, 0, S, S);
      borderGrad.addColorStop(0, 'rgba(184,71,255,0.5)');
      borderGrad.addColorStop(0.5, 'rgba(0,229,255,0.4)');
      borderGrad.addColorStop(1, 'rgba(255,61,107,0.5)');
      ctx.lineWidth = S * 0.05;
      ctx.strokeStyle = borderGrad;
      roundRectPath(ctx, S * 0.025, S * 0.025, S * 0.95, S * 0.95, S * 0.1);
      ctx.stroke();

      // Функция рисования одного шарика
      function drawBall(x, y, r, colors) {
        // Тело шарика
        const bodyGrad = ctx.createRadialGradient(
          x - r * 0.3, y - r * 0.3, r * 0.1,
          x, y, r
        );
        bodyGrad.addColorStop(0, colors.hi);
        bodyGrad.addColorStop(0.4, colors.mid);
        bodyGrad.addColorStop(1, colors.dark);
        ctx.fillStyle = bodyGrad;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();

        // Неоновый ореол
        ctx.shadowColor = colors.glow;
        ctx.shadowBlur = r * 0.8;
        ctx.beginPath();
        ctx.arc(x, y, r * 0.9, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Блик (highlight)
        const shineGrad = ctx.createRadialGradient(
          x - r * 0.3, y - r * 0.3, 0,
          x, y, r
        );
        shineGrad.addColorStop(0, 'rgba(255,255,255,0.8)');
        shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = shineGrad;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      const r = S * 0.17;
      drawBall(S * 0.3, S * 0.3, r, { hi: '#ffbbcc', mid: '#FF3D5A', dark: '#4a0010', glow: '#FF1040' });
      drawBall(S * 0.7, S * 0.3, r, { hi: '#99f0ff', mid: '#00DCFF', dark: '#002030', glow: '#00A8D4' });
      drawBall(S * 0.3, S * 0.7, r, { hi: '#ccff99', mid: '#72FF44', dark: '#163300', glow: '#50DD00' });
      drawBall(S * 0.7, S * 0.7, r, { hi: '#ffea99', mid: '#FFC020', dark: '#352000', glow: '#FF8800' });
    }

    // ── Icon: Bukovki ─────────────────────────────────────────────────────────────
    function drawBukovkiIcon(ctx, S) {
      const bg = '#1c1c2e';
      const border = '#2e2e50';
      const accent = '#7b7bff';
      const radius = S * 0.14;

      // Тень плитки
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = S * 0.12;
      ctx.shadowOffsetY = S * 0.02;

      roundRectPath(ctx, 0, 0, S, S, radius);
      ctx.fillStyle = bg;
      ctx.fill();

      // Рамка
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;
      ctx.lineWidth = S * 0.02;
      ctx.strokeStyle = border;
      ctx.stroke();

      // Тонкий highlight сверху
      ctx.beginPath();
      ctx.moveTo(radius, 1);
      ctx.lineTo(S - radius, 1);
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Буква «Б» с градиентом
      ctx.font = `900 ${S * 0.55}px Unbounded, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const letterGrad = ctx.createLinearGradient(0, 0, S, S);
      letterGrad.addColorStop(0, '#ffffff');
      letterGrad.addColorStop(1, accent);
      ctx.fillStyle = letterGrad;

      ctx.shadowColor = accent;
      ctx.shadowBlur = S * 0.08;
      ctx.fillText('Б', S / 2, S / 2);
      ctx.shadowBlur = 0;

      // Радиальное свечение поверх
      const glowGrad = ctx.createRadialGradient(S * 0.7, S * 0.3, 0, S * 0.7, S * 0.3, S);
      glowGrad.addColorStop(0, 'rgba(123,123,255,0.15)');
      glowGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = glowGrad;
      ctx.fillRect(0, 0, S, S);
    }

    // ── Icon Registry ─────────────────────────────────────────────────────────────
    // Чтобы добавить иконку: { id: 'yourId', draw: yourDrawFunction }
    const ICON_REGISTRY = [
      { id: 'xiangqi', draw: drawXiangqiIcon },
      { id: 'jawbreaker', draw: drawJawbreakerIcon },
      { id: 'bukovki', draw: drawBukovkiIcon },
      { id: 'synth', draw: drawSynthIcon },
    ];

    // Кэш отрендеренных иконок (рендерим один раз в offscreen canvas)
    const ICON_CACHE = {};
    const ICON_SIZE = 128; // размер иконки = размер карточки для full-bleed

    function getIconCanvas(id) {
      if (ICON_CACHE[id]) return ICON_CACHE[id];
      const entry = ICON_REGISTRY.find(e => e.id === id);
      if (!entry) return null;

      const cv = document.createElement('canvas');
      cv.width = cv.height = ICON_SIZE;
      const ic = cv.getContext('2d');

      // Сбрасываем состояние перед рисованием
      ic.clearRect(0, 0, ICON_SIZE, ICON_SIZE);
      ic.save();
      entry.draw(ic, ICON_SIZE);
      ic.restore();

      ICON_CACHE[id] = cv;
      return cv;
    }

    // Предварительно рендерим все иконки после загрузки шрифтов
    // (нужно для Unbounded в bukovki)
    document.fonts.ready.then(() => {
      ICON_REGISTRY.forEach(e => {
        delete ICON_CACHE[e.id]; // сбрасываем кэш и перерендерим с загруженными шрифтами
        getIconCanvas(e.id);
      });
    });

    // ── Cards Definition ──────────────────────────────────────────────────────────
    // Каждая карточка:
    //   hi, lo   — цвета градиента (используются если icon не указан)
    //   label    — текст (используется если icon не указан)
    //   icon     — id из ICON_REGISTRY (если указан — рисует иконку full-bleed)
    //   url      — куда переходить при снапе
    const CARDS_DEF = [
      {
        hi: '#d4449a', lo: '#7a1a5e',
        label: 'СЯНЦИ',
        icon: 'xiangqi',
        url: 'https://willchipe.github.io/Sun-Tzu-Xiangqi/',
      },
      {
        hi: '#0dcfcf', lo: '#0a6a6a',
        label: 'JAWBREAKER',
        icon: 'jawbreaker',
        url: 'jawbreaker.html',
      },
      {
        hi: '#b967ff', lo: '#5a1e99',
        label: 'BUKOVKI',
        icon: 'bukovki',
        url: 'letter-tiles.html',
      },
      {
        hi: '#7B2FFF', lo: '#00F5D4',
        label: 'SYNTH',
        icon: 'synth',
        url: 'synth_v5.html',
      },
    ];

    let cards = [];

    function spawnCards() {
      cards.forEach(c => World.remove(world, c.body));
      cards = [];
      const cw = CARD_W(), ch = CARD_H(), cr = CARD_R();
      const spacing = cw * 1.6;
      CARDS_DEF.forEach((def, i) => {
        const body = Bodies.rectangle(
          W / 2 + (i - 1) * spacing, -120 - i * 95,
          cw, ch,
          { chamfer: { radius: cr }, restitution: 0.28, friction: 0.42, frictionAir: 0.014, density: 0.0026, label: 'card' }
        );
        Body.setAngle(body, (Math.random() - 0.5) * 0.55);
        Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.08);
        cards.push({ ...def, body, snapped: false });
      });
      World.add(world, cards.map(c => c.body));
    }

    // ── Statics ───────────────────────────────────────────────────────────────────

    let sGround, sWallL, sWallR;
    function rebuildStatics() {
      [sGround, sWallL, sWallR].filter(Boolean).forEach(b => World.remove(world, b));
      sGround = Bodies.rectangle(W / 2, H + 32, W * 4, 80, { isStatic: true, friction: 0.48, restitution: 0.22 });
      sWallL = Bodies.rectangle(-32, H / 2, 64, H * 4, { isStatic: true });
      sWallR = Bodies.rectangle(W + 32, H / 2, 64, H * 4, { isStatic: true });
      World.add(world, [sGround, sWallL, sWallR]);
    }
    rebuildStatics();
    spawnCards();

    // ── Mouse ─────────────────────────────────────────────────────────────────────

    const mMouse = Mouse.create(canvas);
    const mc = MouseConstraint.create(engine, {
      mouse: mMouse,
      constraint: { stiffness: 0.22, angularStiffness: 0.03, render: { visible: false } },
    });
    World.add(world, mc);

    // ── Slot ──────────────────────────────────────────────────────────────────────

    // Радиусы масштабируются вместе с карточками
    const BASE_SNAP_RADIUS = 74, BASE_MAG_RADIUS = 168;
    const snapRadius = () => BASE_SNAP_RADIUS * cardScale();
    const magRadius = () => BASE_MAG_RADIUS * cardScale();

    // Солнце и слот — всегда строго одна точка: центр солнца = W/2, H*0.64
    const slotPos = () => ({ x: W / 2, y: H * 0.64 });

    let slotGlow = 0, dragging = null, locked = false;

    // previewCard: карточка в режиме предпросмотра в слоте.
    // Мы НЕ делаем setStatic — тело остаётся динамичным и захваченным мышью.
    // Вместо этого в beforeUpdate мы каждый кадр принудительно
    // ставим позицию/угол в центр слота, пока курсор внутри snapRadius.
    // Как только курсор выходит — просто перестаём это делать, физика сама подхватывает.
    let previewCard = null;

    Events.on(mc, 'startdrag', e => { dragging = e.body; });

    Events.on(mc, 'enddrag', e => {
      const body = e.body;
      const card = cards.find(c => c.body === body);
      const wasPreview = previewCard === card;
      dragging = null;
      previewCard = null;

      if (locked || !card) return;

      // Если отпустили пока карточка была в preview — активируем
      if (wasPreview) {
        activateCard(card);
      }
    });

    Events.on(engine, 'beforeUpdate', () => {
      if (!dragging || locked) return;

      const s = slotPos();
      const mr = magRadius();
      const sr = snapRadius();

      const mx = mMouse.position.x;
      const my = mMouse.position.y;
      const dMouse = Math.hypot(mx - s.x, my - s.y);

      const dragCard = cards.find(c => c.body === dragging);
      if (!dragCard) return;

      if (dMouse < sr) {
        // Играем звук один раз при входе в зону
        if (previewCard !== dragCard) playMagnet();
        previewCard = dragCard;

        // Плавная интерполяция позиции к центру слота (lerp)
        const lerpSpeed = 0.18;
        const px = dragging.position.x + (s.x - dragging.position.x) * lerpSpeed;
        const py = dragging.position.y + (s.y - dragging.position.y) * lerpSpeed;
        Body.setPosition(dragging, { x: px, y: py });

        // Плавное гашение угловой скорости и угла
        const newAngle = dragging.angle * (1 - lerpSpeed);
        Body.setAngle(dragging, newAngle);
        Body.setAngularVelocity(dragging, dragging.angularVelocity * 0.7);
        Body.setVelocity(dragging, {
          x: dragging.velocity.x * 0.7,
          y: dragging.velocity.y * 0.7,
        });
      } else {
        previewCard = null;

        // Мягкое магнитное притяжение
        const dx = s.x - dragging.position.x;
        const dy = s.y - dragging.position.y;
        const dBody = Math.hypot(dx, dy);
        if (dBody < mr && dBody > 6) {
          const t = (1 - dBody / mr) * 0.0018;
          Body.applyForce(dragging, dragging.position, { x: dx * t, y: dy * t });
        }
      }
    });

    // ── Активация карточки (снап + редирект) ──────────────────────────────────────

    function activateCard(card) {
      locked = true;
      card.snapped = true;

      // --- ДОБАВЛЕНО: Затухание музыки ---
      const music = document.getElementById('bg-music'); // Укажите ID вашего плеера
      if (music) {
        const fadeOutTime = 150; // Чуть меньше, чем задержка редиректа
        const steps = 10;
        const stepValue = music.volume / steps;
        const interval = fadeOutTime / steps;

        const fadeInterval = setInterval(() => {
          if (music.volume > stepValue) {
            music.volume -= stepValue;
          } else {
            music.volume = 0;
            clearInterval(fadeInterval);
          }
        }, interval);
      }
      // ---------------------------------

      const body = card.body;
      const target = slotPos();

      Body.setVelocity(body, { x: 0, y: 0 });
      Body.setAngularVelocity(body, 0);
      Body.setStatic(body, true);
      Body.setPosition(body, target);
      Body.setAngle(body, 0);

      playSnap();

      setTimeout(() => redirect(card.url), 280);
    }

    // Обратная совместимость (используется если понадобится вызов извне)
    function snapCard(card, target) { activateCard(card); }

    function redirect(url) {
      document.getElementById('veil').classList.add('show');
      setTimeout(() => { location.href = url; }, 650);
    }

    // Сброс завесы при возврате назад (bfcache восстанавливает страницу как есть)
    window.addEventListener('pageshow', e => {
      const veil = document.getElementById('veil');
      veil.style.transition = 'none';
      veil.classList.remove('show');
      // Форсируем reflow чтобы transition не сработал при снятии класса
      veil.offsetHeight;
      veil.style.transition = '';
      locked = false;
    });

    // ── Audio ─────────────────────────────────────────────────────────────────────

    let audioCtx = null;
    function getAC() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playImpact(speed) {
      if (speed < 1.8) return;
      try {
        const ac = getAC(), len = (ac.sampleRate * 0.065) | 0;
        const buf = ac.createBuffer(1, len, ac.sampleRate);
        const dat = buf.getChannelData(0);
        const tau = ac.sampleRate * 0.023;
        for (let i = 0; i < len; i++) dat[i] = (Math.random() * 2 - 1) * Math.exp(-i / tau);
        const src = ac.createBufferSource(); src.buffer = buf;
        const lp = ac.createBiquadFilter(); lp.type = 'lowpass';
        lp.frequency.value = Math.min(280 + speed * 65, 1500);
        const g = ac.createGain(); g.gain.value = Math.min(speed / 10, 0.52);
        src.connect(lp); lp.connect(g); g.connect(ac.destination); src.start();
      } catch (_) { }
    }

    function playSnap() {
      try {
        const ac = getAC();
        [[523.25, 0], [659.25, 0.068], [783.99, 0.136]].forEach(([freq, delay]) => {
          const t = ac.currentTime + delay;
          const o = ac.createOscillator(); o.type = 'sine'; o.frequency.value = freq;
          const g = ac.createGain();
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.35, t + 0.013);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.52);
          o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t + 0.52);
        });
      } catch (_) { }
    }

    // Мягкий «втягивающий» звук при входе в зону магнита
    function playMagnet() {
      try {
        const ac = getAC();
        const t = ac.currentTime;

        // Низкий синус с питч-свипом вверх — ощущение притяжения
        const o = ac.createOscillator();
        o.type = 'sine';
        o.frequency.setValueAtTime(180, t);
        o.frequency.exponentialRampToValueAtTime(420, t + 0.18);

        // Второй тон чуть выше — лёгкий хорус
        const o2 = ac.createOscillator();
        o2.type = 'sine';
        o2.frequency.setValueAtTime(185, t);
        o2.frequency.exponentialRampToValueAtTime(430, t + 0.18);

        const g = ac.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.18, t + 0.04);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);

        o.connect(g); o2.connect(g); g.connect(ac.destination);
        o.start(t); o.stop(t + 0.3);
        o2.start(t); o2.stop(t + 0.3);
      } catch (_) { }
    }

    const hitTimestamps = new Map();
    Events.on(engine, 'collisionStart', ({ pairs }) => {
      pairs.forEach(({ bodyA, bodyB }) => {
        const key = `${Math.min(bodyA.id, bodyB.id)}_${Math.max(bodyA.id, bodyB.id)}`;
        const now = performance.now();
        if (now - (hitTimestamps.get(key) ?? 0) < 80) return;
        hitTimestamps.set(key, now);
        playImpact(Vector.magnitude(Vector.sub(bodyA.velocity, bodyB.velocity)));
      });
    });

    // ── Draw helpers ──────────────────────────────────────────────────────────────

    function rrPath(cx, cy, w, h, r) {
      const hw = w / 2, hh = h / 2;
      ctx.beginPath();
      ctx.moveTo(cx - hw + r, cy - hh);
      ctx.lineTo(cx + hw - r, cy - hh); ctx.arcTo(cx + hw, cy - hh, cx + hw, cy - hh + r, r);
      ctx.lineTo(cx + hw, cy + hh - r); ctx.arcTo(cx + hw, cy + hh, cx + hw - r, cy + hh, r);
      ctx.lineTo(cx - hw + r, cy + hh); ctx.arcTo(cx - hw, cy + hh, cx - hw, cy + hh - r, r);
      ctx.lineTo(cx - hw, cy - hh + r); ctx.arcTo(cx - hw, cy - hh, cx - hw + r, cy - hh, r);
      ctx.closePath();
    }

    // ── Background layers ─────────────────────────────────────────────────────────

    function drawSky() {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, '#0d0015');
      g.addColorStop(0.38, '#1a003a');
      g.addColorStop(0.62, '#2d0050');
      g.addColorStop(0.72, '#3a0020');
      g.addColorStop(1, '#0d0015');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    let sunPulse = 0;
    function drawSun(t) {
      sunPulse = Math.sin(t * 0.0009) * 0.5 + 0.5;
      const cx = W / 2;
      const cy = H * 0.64;
      const r = Math.min(W, H) * 0.17;

      ctx.save();

      for (let i = 3; i >= 1; i--) {
        ctx.beginPath();
        ctx.arc(cx, cy, r + i * 18 + sunPulse * 6, 0, Math.PI * 2);
        const rg = ctx.createRadialGradient(cx, cy, r, cx, cy, r + i * 18 + sunPulse * 6);
        rg.addColorStop(0, `rgba(255, 113, 206, ${0.06 / i})`);
        rg.addColorStop(1, 'rgba(255, 113, 206, 0)');
        ctx.fillStyle = rg;
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      const sg = ctx.createLinearGradient(cx, cy - r, cx, cy + r);
      sg.addColorStop(0, '#fffb96');
      sg.addColorStop(0.3, '#ff9d00');
      sg.addColorStop(0.6, '#ff4d88');
      sg.addColorStop(1, '#b967ff');
      ctx.fillStyle = sg;
      ctx.fill();

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.clip();
      ctx.fillStyle = 'rgba(13, 0, 21, 0.55)';
      const lineH = 5, gap = 4;
      for (let y = cy - r; y < cy + r; y += lineH + gap) {
        ctx.fillRect(cx - r, y + lineH * 0.55, r * 2, lineH * 0.45);
      }
      ctx.restore();

      ctx.restore();
    }

    let gridOffset = 0;
    function drawGrid(t) {
      const horizon = H * 0.63;
      const speed = 0.045;
      gridOffset = (gridOffset + speed) % (H * 0.08);

      ctx.save();
      ctx.beginPath();
      ctx.rect(0, horizon, W, H - horizon);
      ctx.clip();

      const vx = W / 2;
      const vy = horizon;

      const VCOLS = 14;
      const spread = W * 1.2;

      for (let i = 0; i <= VCOLS; i++) {
        const fx = vx - spread / 2 + (spread / VCOLS) * i;
        const alpha = 0.18 + 0.1 * Math.sin(t * 0.0006 + i * 0.3);

        ctx.beginPath();
        ctx.moveTo(vx, vy);
        ctx.lineTo(fx, H + 30);

        const lineGrad = ctx.createLinearGradient(vx, vy, fx, H);
        lineGrad.addColorStop(0, `rgba(255, 0, 255, 0)`);
        lineGrad.addColorStop(0.3, `rgba(255, 0, 255, ${alpha})`);
        lineGrad.addColorStop(1, `rgba(255, 0, 255, ${alpha * 0.5})`);
        ctx.strokeStyle = lineGrad;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      const HROWS = 12;
      for (let i = 0; i <= HROWS; i++) {
        const rawT = i / HROWS;
        const scrollT = ((rawT + gridOffset / (H * 0.08) / HROWS) % 1);
        const pt = scrollT ** 2.2;

        const y = horizon + (H - horizon + 30) * pt;
        const xspan = 0.5 + 0.5 * pt;
        const x0 = W / 2 - (W * xspan);
        const x1 = W / 2 + (W * xspan);

        const alpha = pt * 0.28;
        ctx.beginPath();
        ctx.moveTo(x0, y); ctx.lineTo(x1, y);

        const hGrad = ctx.createLinearGradient(x0, y, x1, y);
        hGrad.addColorStop(0, 'rgba(0, 255, 255, 0)');
        hGrad.addColorStop(0.2, `rgba(0, 255, 255, ${alpha})`);
        hGrad.addColorStop(0.5, `rgba(0, 255, 255, ${alpha * 1.3})`);
        hGrad.addColorStop(0.8, `rgba(0, 255, 255, ${alpha})`);
        hGrad.addColorStop(1, 'rgba(0, 255, 255, 0)');
        ctx.strokeStyle = hGrad;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }

      const groundGlow = ctx.createLinearGradient(0, horizon, 0, H);
      groundGlow.addColorStop(0, 'rgba(180, 0, 255, 0.06)');
      groundGlow.addColorStop(0.5, 'rgba(255, 0, 150, 0.04)');
      groundGlow.addColorStop(1, 'rgba(0, 0, 0, 0.4)');
      ctx.fillStyle = groundGlow;
      ctx.fillRect(0, horizon, W, H - horizon);

      ctx.restore();
    }

    // Плавающие строки кода — движутся сверху вниз и зацикливаются
    function drawCodeFragments(dt) {
      ctx.save();
      ctx.textBaseline = 'top';

      codeFragments.forEach(f => {
        // Движение вниз: увеличиваем y
        f.y += f.vy * dt;

        // Когда фрагмент уходит ниже нижней границы — появляется сверху
        if (f.y > 1.05) {
          f.y = -0.05;
          f.x = Math.random() * 1.2 - 0.1;
        }

        const x = f.x * W;
        const y = f.y * H;

        ctx.globalAlpha = f.alpha;
        ctx.fillStyle = f.color;
        ctx.font = `300 ${f.size}px "Courier New", monospace`;
        ctx.fillText(f.text, x, y);
      });

      ctx.globalAlpha = 1;
      ctx.restore();
    }

    const STARS = Array.from({ length: 120 }, () => ({
      x: Math.random(), y: Math.random() * 0.65,
      r: Math.random() * 1.4 + 0.3,
      twinkle: Math.random() * Math.PI * 2,
      speed: 0.0008 + Math.random() * 0.002,
    }));

    function drawStars(t) {
      STARS.forEach(s => {
        const alpha = 0.3 + 0.7 * (Math.sin(t * s.speed + s.twinkle) * 0.5 + 0.5);
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.7})`;
        ctx.fill();
      });
    }

    function drawGrain() {
      if (!noisePat) noisePat = ctx.createPattern(noiseCv, 'repeat');
      ctx.fillStyle = noisePat;
      ctx.fillRect(0, 0, W, H);
    }

    function drawHorizonGlow() {
      const y = H * 0.63;
      const g = ctx.createLinearGradient(0, y - 8, 0, y + 24);
      g.addColorStop(0, 'rgba(255, 113, 206, 0)');
      g.addColorStop(0.3, 'rgba(255, 113, 206, 0.22)');
      g.addColorStop(0.5, 'rgba(255, 200, 255, 0.35)');
      g.addColorStop(0.7, 'rgba(255, 113, 206, 0.14)');
      g.addColorStop(1, 'rgba(255, 113, 206, 0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, y - 8, W, 32);

      ctx.strokeStyle = 'rgba(255, 200, 255, 0.55)';
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // ── Slot ──────────────────────────────────────────────────────────────────────

    function drawSlot(t) {
      const { x: sx, y: sy } = slotPos();
      const cw = CARD_W(), ch = CARD_H(), cr = CARD_R();
      const sw = cw + 12, sh = ch + 12, sr = cr + 5;

      const breathe = (Math.sin(t * 0.0008) * 0.5 + 0.5) * 0.07 + 0.02;
      const totalGlow = Math.max(breathe, slotGlow);

      ctx.save();
      ctx.translate(sx, sy);

      const aR = Math.max(sw, sh) * 2;
      const ag = ctx.createRadialGradient(0, 0, sw * 0.3, 0, 0, aR);
      ag.addColorStop(0, `rgba(185, 103, 255, ${totalGlow * 0.28})`);
      ag.addColorStop(0.5, `rgba(255, 113, 206, ${totalGlow * 0.08})`);
      ag.addColorStop(1, 'rgba(185, 103, 255, 0)');
      ctx.fillStyle = ag;
      ctx.fillRect(-aR, -aR, aR * 2, aR * 2);

      rrPath(0, 0, sw + 4, sh + 4, sr + 2);
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fill();

      rrPath(0, 0, sw, sh, sr);
      const dg = ctx.createRadialGradient(-sw * 0.15, -sh * 0.2, 0, 0, 0, Math.max(sw, sh) * 0.75);
      dg.addColorStop(0, '#0a0520');
      dg.addColorStop(1, '#04020e');
      ctx.fillStyle = dg;
      ctx.fill();

      ctx.save();
      rrPath(0, 0, sw, sh, sr); ctx.clip();

      const topS = ctx.createLinearGradient(0, -sh / 2, 0, -sh / 2 + sh * 0.5);
      topS.addColorStop(0, 'rgba(0,0,0,0.7)'); topS.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = topS; ctx.fillRect(-sw / 2, -sh / 2, sw, sh * 0.5);

      const leftS = ctx.createLinearGradient(-sw / 2, 0, -sw / 2 + sw * 0.42, 0);
      leftS.addColorStop(0, 'rgba(0,0,0,0.4)'); leftS.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = leftS; ctx.fillRect(-sw / 2, -sh / 2, sw * 0.42, sh);

      const bl = ctx.createLinearGradient(0, sh / 2, 0, sh / 2 - 10);
      bl.addColorStop(0, `rgba(185, 103, 255, ${0.06 + slotGlow * 0.18})`);
      bl.addColorStop(1, 'rgba(185, 103, 255, 0)');
      ctx.fillStyle = bl; ctx.fillRect(-sw / 2, sh / 2 - 10, sw, 10);
      ctx.restore();

      rrPath(0, 0, sw, sh, sr);
      ctx.strokeStyle = `rgba(185, 103, 255, ${0.15 + totalGlow * 0.5})`;
      ctx.lineWidth = totalGlow > 0.4 ? 1.5 : 1;
      ctx.stroke();

      if (slotGlow > 0.45 && !locked) {
        const a = Math.min((slotGlow - 0.45) / 0.55, 1);
        ctx.globalAlpha = a * 0.7;
        ctx.fillStyle = '#01cdfe';
        ctx.font = '300 10px "Cormorant Garamond", serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('о т п у с т и', 0, 0);
        ctx.globalAlpha = 1;
      }

      ctx.restore();
    }

    // ── Cards ─────────────────────────────────────────────────────────────────────

    function drawCards() {
      const cw = CARD_W(), ch = CARD_H(), cr = CARD_R();
      cards.forEach(({ body, hi, lo, label, icon }) => {
        const { x, y } = body.position;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(body.angle);

        // Тень
        ctx.shadowColor = hi;
        ctx.shadowBlur = 28 * cardScale();
        ctx.shadowOffsetY = 8 * cardScale();
        rrPath(0, 0, cw, ch, cr);
        ctx.fillStyle = lo;
        ctx.fill();

        ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

        ctx.save();
        rrPath(0, 0, cw, ch, cr); ctx.clip();

        if (icon) {
          const iconCv = getIconCanvas(icon);
          if (iconCv) {
            ctx.drawImage(iconCv, -cw / 2, -ch / 2, cw, ch);
          }
        } else {
          const bg = ctx.createLinearGradient(0, -ch / 2, 0, ch / 2);
          bg.addColorStop(0, hi); bg.addColorStop(1, lo);
          ctx.fillStyle = bg; ctx.fillRect(-cw / 2, -ch / 2, cw, ch);

          const sh = ctx.createLinearGradient(-cw * 0.2, -ch / 2, cw * 0.4, -ch / 2 + ch * 0.65);
          sh.addColorStop(0, 'rgba(255,255,255,0.22)');
          sh.addColorStop(0.6, 'rgba(255,255,255,0.05)');
          sh.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = sh; ctx.fillRect(-cw / 2, -ch / 2, cw, ch);

          ctx.fillStyle = 'rgba(0,0,0,0.08)';
          for (let ly = -ch / 2; ly < ch / 2; ly += 4) ctx.fillRect(-cw / 2, ly, cw, 2);

          ctx.restore();
          ctx.save();
          rrPath(0, 0, cw, ch, cr); ctx.clip();

          ctx.fillStyle = 'rgba(255,255,255,0.95)';
          ctx.font = `600 ${Math.round(13 * cardScale())}px "Cormorant SC", serif`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(label, 0, 1);
        }

        ctx.restore();

        // Неоновая рамка поверх
        rrPath(0, 0, cw, ch, cr);
        ctx.strokeStyle = `${hi}66`; ctx.lineWidth = 1.5; ctx.stroke();

        ctx.restore();
      });
    }

    // ── Main loop ─────────────────────────────────────────────────────────────────

    let lastT = 0;
    function render(t) {
      const dt = t - lastT; lastT = t;

      const { x: sx, y: sy } = slotPos();
      let targetGlow = 0;
      if (dragging && !locked) {
        const d = Math.hypot(dragging.position.x - sx, dragging.position.y - sy);
        targetGlow = Math.max(0, 1 - d / magRadius());
      }
      // При preview — слот максимально светится
      if (previewCard) targetGlow = 1;
      slotGlow += (targetGlow - slotGlow) * 0.11;

      drawSky();
      drawStars(t);
      drawSun(t);
      drawHorizonGlow();
      drawGrid(t);
      drawCodeFragments(dt);
      drawGrain();
      drawSlot(t);
      drawCards();

      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);

    // ── Cursor (mouse) ────────────────────────────────────────────────────────────

    canvas.addEventListener('mousemove', e => {
      if (dragging) { canvas.style.cursor = previewCard ? 'cell' : 'grabbing'; return; }
      const cw = CARD_W(), ch = CARD_H();
      const over = cards.some(c => {
        if (c.snapped) return false;
        return Math.hypot(e.clientX - c.body.position.x, e.clientY - c.body.position.y) < Math.max(cw, ch) * 0.68;
      });
      canvas.style.cursor = over ? 'grab' : 'default';
    });
    canvas.addEventListener('mousedown', () => { if (dragging) canvas.style.cursor = 'grabbing'; });
    canvas.addEventListener('mouseup', () => { canvas.style.cursor = 'default'; });
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    // ── Touch support ─────────────────────────────────────────────────────────────
    // Matter.js Mouse уже слушает touch-события на canvas, но нам нужно
    // передавать координаты вручную через Mouse.setOffset и синтетические события

    function getTouchPos(touch) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (touch.clientX - rect.left) * (W / rect.width),
        y: (touch.clientY - rect.top) * (H / rect.height),
      };
    }

    // Патчим Mouse чтобы он получал touch-координаты
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const pos = getTouchPos(e.touches[0]);
      mMouse.position.x = pos.x;
      mMouse.position.y = pos.y;
      mMouse.button = 0;
      // Имитируем mousedown для MouseConstraint
      canvas.dispatchEvent(new MouseEvent('mousedown', {
        clientX: e.touches[0].clientX,
        clientY: e.touches[0].clientY,
        bubbles: true,
      }));
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const pos = getTouchPos(e.touches[0]);
      mMouse.position.x = pos.x;
      mMouse.position.y = pos.y;
      canvas.dispatchEvent(new MouseEvent('mousemove', {
        clientX: e.touches[0].clientX,
        clientY: e.touches[0].clientY,
        bubbles: true,
      }));
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      mMouse.button = -1;
      const lastTouch = e.changedTouches[0];
      canvas.dispatchEvent(new MouseEvent('mouseup', {
        clientX: lastTouch.clientX,
        clientY: lastTouch.clientY,
        bubbles: true,
      }));
    }, { passive: false });
    window.addEventListener('pageshow', (event) => {
      if (event.persisted) {
        // Если страница восстановлена из bfcache, перезагружаем её
        window.location.reload();
      }
    });

    // ── Volume Control ────────────────────────────────────────────────────────────

    const audio = document.getElementById('bg-music');
    const volSlider = document.getElementById('vol-slider');
    const volWave1 = document.getElementById('vol-wave1');
    const volWave2 = document.getElementById('vol-wave2');

    function setVolume(val) {
      const v = Math.max(0, Math.min(100, val));
      audio.volume = v / 100;
      volSlider.value = v;
      // Update slider gradient fill
      volSlider.style.setProperty('--pct', v + '%');
      // Update icon: hide waves when muted
      const muted = v === 0;
      volWave1.style.opacity = muted ? '0' : v < 40 ? '0.4' : '1';
      volWave2.style.opacity = muted ? '0' : v < 60 ? '0' : (v - 60) / 40 + '';
    }

    // Init at 10%
    setVolume(10);

    volSlider.addEventListener('input', () => setVolume(Number(volSlider.value)));

    // Mouse wheel controls volume globally
    window.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -5 : 5;
      setVolume(Number(volSlider.value) + delta);
    }, { passive: false });

    // ── Card out-of-bounds respawn ─────────────────────────────────────────────────

    setInterval(() => {
      cards.forEach(card => {
        if (card.snapped) return;
        const { x, y } = card.body.position;
        const margin = 200;
        if (x < -margin || x > W + margin || y > H + margin || y < -margin * 5) {
          // Respawn from top, random X position
          const newX = W * 0.2 + Math.random() * W * 0.6;
          Body.setPosition(card.body, { x: newX, y: -120 });
          Body.setVelocity(card.body, { x: (Math.random() - 0.5) * 2, y: 0 });
          Body.setAngularVelocity(card.body, (Math.random() - 0.5) * 0.08);
          Body.setAngle(card.body, (Math.random() - 0.5) * 0.55);
        }
      });
    }, 2000);
  </script>
</body>
